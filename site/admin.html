<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Poly</title>
<link rel="icon" href="logo.png" />
<meta name="robots" content="noindex, nofollow" />
<style>
  :root {
    --ink: #14171d;
    --ink-raised: #1b1f27;
    --border: rgba(255, 255, 255, 0.10);
    --text: #e9e4d8;
    --text-dim: #9c9686;
    --accent: #f0a93e;
    --accent-ink: #14171d;
    --danger: #e0664a;
    --ok: #4caf7d;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --ink: #eff1f4; --ink-raised: #ffffff; --border: rgba(20, 23, 29, 0.10);
    --text: #1b1e24; --text-dim: #5b6270; --accent: #a8660a; --accent-ink: #ffffff;
    color-scheme: light;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --ink: #eff1f4; --ink-raised: #ffffff; --border: rgba(20, 23, 29, 0.10);
      --text: #1b1e24; --text-dim: #5b6270; --accent: #a8660a; --accent-ink: #ffffff;
      color-scheme: light;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--text); font-family: var(--sans); overflow-x: hidden; }
  body { min-height: 100vh; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 2rem clamp(1.25rem, 4vw, 2rem) 5rem; }
  .wordmark { font-family: var(--mono); font-weight: 700; font-size: 1.05rem; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
  .wordmark span { color: var(--accent); }
  h1 { font-size: 1.3rem; margin: 0 0 1.75rem; color: var(--text-dim); font-weight: 600; }
  .missing { text-align: center; padding: 6rem 1rem; color: var(--text-dim); }

  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .tab-btn {
    background: none; border: none; padding: 0.7rem 1rem; font-family: var(--sans); font-size: 0.88rem;
    color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
  [data-tab] { display: none; }
  [data-tab].active { display: block; }

  .card { background: var(--ink-raised); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.25rem; }
  .card h2 { font-size: 0.95rem; margin: 0 0 1rem; }
  label { display: block; font-size: 0.8rem; color: var(--text-dim); margin: 0 0 0.35rem; }
  input[type=text], textarea, select {
    width: 100%; padding: 0.6rem 0.75rem; margin-bottom: 1rem; background: var(--ink); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-family: var(--sans); font-size: 0.88rem;
  }
  input[type=text]:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  .radio-row { display: flex; gap: 1.25rem; margin-bottom: 1rem; font-size: 0.85rem; }
  .radio-row label { display: flex; align-items: center; gap: 0.4rem; margin: 0; color: var(--text); }

  .editor-toolbar { display: flex; gap: 0.3rem; margin-bottom: 0.5rem; }
  .editor-toolbar button {
    width: 32px; height: 32px; border: 1px solid var(--border); background: var(--ink); color: var(--text);
    border-radius: 6px; cursor: pointer; font-size: 0.85rem;
  }
  .editor-toolbar button:hover { border-color: var(--accent); }
  .editor-toolbar button.b { font-weight: 800; }
  .editor-toolbar button.i { font-style: italic; }
  .editor-toolbar button.u { text-decoration: underline; }
  #notif-body {
    min-height: 120px; padding: 0.7rem 0.9rem; background: var(--ink); border: 1px solid var(--border);
    border-radius: 6px; font-size: 0.88rem; line-height: 1.55; margin-bottom: 1rem;
  }
  #notif-body:focus { outline: none; border-color: var(--accent); }
  #notif-body a { color: var(--accent); }

  .btn { padding: 0.65rem 1.1rem; background: var(--accent); color: var(--accent-ink); border: none; border-radius: 6px; font-weight: 700; font-family: var(--sans); font-size: 0.85rem; cursor: pointer; }
  .btn:hover { opacity: 0.92; }
  .btn.small { padding: 0.4rem 0.75rem; font-size: 0.78rem; }
  .btn.danger { background: var(--danger); color: #fff; }
  .btn.ok { background: var(--ok); color: #fff; }
  .status { font-size: 0.82rem; margin-top: 0.75rem; display: none; }
  .status.show { display: block; }
  .status.ok { color: var(--ok); }
  .status.error { color: var(--danger); }

  .row { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 0.65rem 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .row-info { min-width: 0; }
  .row-name { font-weight: 600; font-size: 0.88rem; }
  .row-meta { font-size: 0.76rem; color: var(--text-dim); font-family: var(--mono); margin-top: 0.15rem; }
  .badge-pill { font-family: var(--mono); font-size: 0.62rem; font-weight: 700; text-transform: uppercase; padding: 0.1rem 0.4rem; border-radius: 999px; }
  .badge-pill.banned { background: rgba(224,102,74,0.18); color: var(--danger); }
  .badge-pill.blocked { background: rgba(224,102,74,0.18); color: var(--danger); }
  .empty-note { font-size: 0.85rem; color: var(--text-dim); padding: 1rem 0; }
</style>
</head>
<body>

<div class="wrap">
  <div data-view="loading">
    <p class="missing">…</p>
  </div>

  <div data-view="denied" style="display:none">
    <p class="missing">404 — Page not found.</p>
  </div>

  <div data-view="admin" style="display:none">
    <div class="wordmark">poly<span>&gt;</span></div>
    <h1>Admin</h1>

    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab-btn="notify">Notify</button>
      <button type="button" class="tab-btn" data-tab-btn="users">Users</button>
      <button type="button" class="tab-btn" data-tab-btn="packages">Packages</button>
    </div>

    <div data-tab="notify" class="active">
      <div class="card">
        <h2>Send a notification</h2>
        <label for="notif-title">Title</label>
        <input type="text" id="notif-title" placeholder="What's new in Poly" maxlength="140">

        <label>Message</label>
        <div class="editor-toolbar">
          <button type="button" class="b" data-cmd="bold" title="Bold">B</button>
          <button type="button" class="i" data-cmd="italic" title="Italic">I</button>
          <button type="button" class="u" data-cmd="underline" title="Underline">U</button>
          <button type="button" data-cmd="createLink" title="Link">🔗</button>
        </div>
        <div id="notif-body" contenteditable="true"></div>

        <label>Send to</label>
        <div class="radio-row">
          <label><input type="radio" name="notif-target" value="all" checked> Everyone</label>
          <label><input type="radio" name="notif-target" value="specific"> Specific usernames</label>
        </div>
        <input type="text" id="notif-usernames" placeholder="username1, username2, ..." style="display:none">

        <button type="button" class="btn" id="notif-send-btn">Send</button>
        <p class="status" id="notif-status"></p>
      </div>
    </div>

    <div data-tab="users">
      <div class="card">
        <h2>Users</h2>
        <input type="text" id="users-search" placeholder="Search by username or email...">
        <div id="users-list"></div>
        <p class="empty-note" id="users-empty" style="display:none">No matches.</p>
      </div>
    </div>

    <div data-tab="packages">
      <div class="card">
        <h2>Packages</h2>
        <input type="text" id="packages-search" placeholder="Search by package name...">
        <div id="packages-list"></div>
        <p class="empty-note" id="packages-empty" style="display:none">No matches.</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const SUPABASE_URL = 'https://iuymslcbbrbahxbfuzrr.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ocTnDk4vyMMGcyGBeB3bOg_0CMGkdaD';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const ADMIN_ID = '7aeb0cc5-7188-46f3-8e12-4caa84573087';

  function showView(name) {
    document.querySelectorAll('[data-view]').forEach((el) => {
      el.style.display = el.getAttribute('data-view') === name ? 'block' : 'none';
    });
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s == null ? '' : String(s);
    return div.innerHTML;
  }

  // --- tabs ---
  document.querySelectorAll('.tab-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach((b) => b.classList.toggle('active', b === btn));
      const name = btn.getAttribute('data-tab-btn');
      document.querySelectorAll('[data-tab]').forEach((el) => el.classList.toggle('active', el.getAttribute('data-tab') === name));
    });
  });

  // --- notify tab ---
  document.querySelectorAll('.editor-toolbar button[data-cmd]').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.getElementById('notif-body').focus();
      const cmd = btn.getAttribute('data-cmd');
      if (cmd === 'createLink') {
        const url = prompt('Link URL:');
        if (url) document.execCommand(cmd, false, url);
      } else {
        document.execCommand(cmd, false, null);
      }
    });
  });

  document.querySelectorAll('input[name="notif-target"]').forEach((r) => {
    r.addEventListener('change', () => {
      document.getElementById('notif-usernames').style.display =
        document.querySelector('input[name="notif-target"]:checked').value === 'specific' ? 'block' : 'none';
    });
  });

  function setNotifStatus(msg, kind) {
    const el = document.getElementById('notif-status');
    el.textContent = msg || '';
    el.className = 'status' + (kind ? ' show ' + kind : '');
  }

  document.getElementById('notif-send-btn').addEventListener('click', async () => {
    const title = document.getElementById('notif-title').value.trim();
    const bodyHtml = document.getElementById('notif-body').innerHTML.trim();
    const target = document.querySelector('input[name="notif-target"]:checked').value;
    if (!title) { setNotifStatus('Title is required.', 'error'); return; }

    let usernames = null;
    if (target === 'specific') {
      usernames = document.getElementById('notif-usernames').value.split(',').map((s) => s.trim()).filter(Boolean);
      if (!usernames.length) { setNotifStatus('Enter at least one username.', 'error'); return; }
    }

    const { data, error } = await supabase.rpc('send_broadcast_notification', {
      p_title: title, p_body_html: bodyHtml || null, p_target_usernames: usernames
    });
    if (error) { setNotifStatus(error.message, 'error'); return; }
    setNotifStatus(`Sent to ${data} recipient${data === 1 ? '' : 's'}.`, 'ok');
    document.getElementById('notif-title').value = '';
    document.getElementById('notif-body').innerHTML = '';
  });

  // --- users tab ---
  async function loadUsers(q) {
    const { data, error } = await supabase.rpc('admin_search_profiles', { p_query: q || '' });
    const list = document.getElementById('users-list');
    const empty = document.getElementById('users-empty');
    if (error || !data || !data.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
      if (error) console.error(error);
      return;
    }
    empty.style.display = 'none';
    list.innerHTML = data.map((u) => `
      <div class="row" data-username="${escapeHtml(u.username)}">
        <div class="row-info">
          <div class="row-name">@${escapeHtml(u.username)} ${u.badge_staff ? '<span class="badge-pill" style="background:rgba(240,169,62,0.18);color:var(--accent)">staff</span>' : ''} ${u.banned ? '<span class="badge-pill banned">banned</span>' : ''}</div>
          <div class="row-meta">${escapeHtml(u.email)} · ${escapeHtml(u.plan)}</div>
        </div>
        <button type="button" class="btn small ${u.banned ? 'ok' : 'danger'} user-ban-btn" data-banned="${u.banned}">${u.banned ? 'Unban' : 'Ban'}</button>
      </div>
    `).join('');
    list.querySelectorAll('.user-ban-btn').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const row = btn.closest('.row');
        const username = row.getAttribute('data-username');
        const currentlyBanned = btn.getAttribute('data-banned') === 'true';
        if (currentlyBanned) {
          await supabase.rpc('admin_set_banned', { p_username: username, p_banned: false });
        } else {
          const reason = prompt(`Reason for banning @${username} (shown to them):`) || null;
          const days = prompt('Temporary ban? Enter number of days, or leave empty for permanent:');
          const until = days && Number(days) > 0 ? new Date(Date.now() + Number(days) * 86400000).toISOString() : null;
          await supabase.rpc('admin_set_banned', { p_username: username, p_banned: true, p_reason: reason, p_until: until });
        }
        loadUsers(document.getElementById('users-search').value.trim());
      });
    });
  }

  let usersDebounce = null;
  document.getElementById('users-search').addEventListener('input', (e) => {
    clearTimeout(usersDebounce);
    usersDebounce = setTimeout(() => loadUsers(e.target.value.trim()), 300);
  });

  // --- packages tab ---
  async function loadPackages(q) {
    const { data, error } = await supabase.rpc('admin_search_packages', { p_query: q || '' });
    const list = document.getElementById('packages-list');
    const empty = document.getElementById('packages-empty');
    if (error || !data || !data.length) {
      list.innerHTML = '';
      empty.style.display = 'block';
      if (error) console.error(error);
      return;
    }
    empty.style.display = 'none';
    list.innerHTML = data.map((p) => `
      <div class="row" data-name="${escapeHtml(p.name)}">
        <div class="row-info">
          <div class="row-name">${escapeHtml(p.name)}@${escapeHtml(p.version)} ${p.blocked ? '<span class="badge-pill blocked">blocked</span>' : ''}</div>
          <div class="row-meta">by @${escapeHtml(p.uploader_username)} · ${p.download_count} downloads</div>
        </div>
        <button type="button" class="btn small ${p.blocked ? 'ok' : 'danger'} pkg-block-btn" data-blocked="${p.blocked}">${p.blocked ? 'Unblock' : 'Block'}</button>
      </div>
    `).join('');
    list.querySelectorAll('.pkg-block-btn').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const row = btn.closest('.row');
        const name = row.getAttribute('data-name');
        const currentlyBlocked = btn.getAttribute('data-blocked') === 'true';
        if (currentlyBlocked) {
          await supabase.rpc('admin_set_package_blocked', { p_name: name, p_blocked: false });
        } else {
          const reason = prompt(`Reason for blocking ${name}:`) || null;
          await supabase.rpc('admin_set_package_blocked', { p_name: name, p_blocked: true, p_reason: reason });
        }
        loadPackages(document.getElementById('packages-search').value.trim());
      });
    });
  }

  let packagesDebounce = null;
  document.getElementById('packages-search').addEventListener('input', (e) => {
    clearTimeout(packagesDebounce);
    packagesDebounce = setTimeout(() => loadPackages(e.target.value.trim()), 300);
  });

  // --- gate + boot ---
  async function boot() {
    const { data } = await supabase.auth.getSession();
    if (!data.session || data.session.user.id !== ADMIN_ID) {
      showView('denied');
      return;
    }
    showView('admin');
    loadUsers('');
    loadPackages('');
  }
  boot();
</script>

</body>
</html>
