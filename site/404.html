<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 · Poly</title>
<link rel="icon" href="logo.png" />
<meta name="description" content="Page not found." />
<meta name="robots" content="noindex" />
<style>
  :root {
    --ink: #14171d; --ink-raised: #1b1f27; --border: rgba(255, 255, 255, 0.10);
    --text: #e9e4d8; --text-dim: #9c9686; --accent: #f0a93e; --accent-ink: #14171d;
    --danger: #e0664a;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --ink: #eff1f4; --ink-raised: #ffffff; --border: rgba(20, 23, 29, 0.10);
    --text: #1b1e24; --text-dim: #5b6270; --accent: #a8660a; --accent-ink: #ffffff;
    color-scheme: light;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --ink: #eff1f4; --ink-raised: #ffffff; --border: rgba(20, 23, 29, 0.10);
      --text: #1b1e24; --text-dim: #5b6270; --accent: #a8660a; --accent-ink: #ffffff;
      color-scheme: light;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body {
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem; position: relative; overflow-x: hidden;
  }

  .glow {
    position: fixed; top: 50%; left: 50%; width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(240, 169, 62, 0.16) 0%, rgba(240, 169, 62, 0) 62%);
    transform: translate(-50%, -50%); pointer-events: none; z-index: 0;
  }
  :root[data-theme="light"] .glow { background: radial-gradient(circle, rgba(168, 102, 10, 0.10) 0%, rgba(168, 102, 10, 0) 62%); }

  .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }

  .wordmark { font-family: var(--mono); font-weight: 700; font-size: 1.05rem; letter-spacing: -0.02em; margin-bottom: 2rem; color: var(--text); }
  .wordmark span { color: var(--accent); }

  .term {
    width: 100%; max-width: 460px; background: var(--ink-raised); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  :root[data-theme="light"] .term { box-shadow: 0 20px 50px rgba(20,23,29,0.14); }

  .term { position: relative; transition: box-shadow 0.15s ease; }
  .term.dragging { transition: none; box-shadow: 0 28px 70px rgba(0,0,0,0.45); cursor: grabbing; user-select: none; }
  .term-bar { display: flex; align-items: center; gap: 0.4rem; padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--border); cursor: grab; touch-action: none; }
  .term-bar:active { cursor: grabbing; }
  .term-dot { width: 10px; height: 10px; border-radius: 50%; }
  .term-dot.red { background: #ec6a5e; }
  .term-dot.yellow { background: #f4bf4f; }
  .term-dot.green { background: #61c454; }
  .term-title { flex: 1; text-align: center; font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); margin-right: 2.4rem; }

  .term-body { padding: 1.4rem 1.3rem 1.6rem; font-family: var(--mono); font-size: 0.86rem; line-height: 1.75; text-align: left; }
  .term-line { opacity: 0; animation: term-in 0.4s ease forwards; white-space: pre-wrap; overflow-wrap: anywhere; }
  .term-line.cmd::before { content: "$ "; color: var(--text-dim); }
  .term-line.err { color: var(--danger); }
  .term-line.dim { color: var(--text-dim); }
  .term-line:nth-child(1) { animation-delay: 0.05s; }
  .term-line:nth-child(2) { animation-delay: 0.35s; }
  .term-line:nth-child(3) { animation-delay: 0.6s; }
  .term-line:nth-child(4) { animation-delay: 0.85s; }
  @keyframes term-in { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
  @media (prefers-reduced-motion: reduce) {
    .term-line { animation: none; opacity: 1; }
  }

  .term-anim { display: flex; justify-content: center; margin: 0.3rem 0 0.1rem; }

  .cursor { display: inline-block; width: 7px; height: 1em; background: var(--accent); vertical-align: text-bottom; animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .home-btn {
    margin-top: 1.75rem; font-family: var(--mono); font-size: 0.85rem; font-weight: 700;
    color: var(--accent-ink); background: var(--accent); border: 1px solid var(--accent);
    border-radius: 8px; padding: 0.7rem 1.4rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .home-btn:hover { opacity: 0.9; text-decoration: none; }
</style>
</head>
<body>
  <div class="glow" aria-hidden="true"></div>
  <div class="content">
    <a href="/" class="wordmark">poly<span>&gt;</span></a>

    <div class="term">
      <div class="term-bar">
        <span class="term-dot red"></span><span class="term-dot yellow"></span><span class="term-dot green"></span>
        <span class="term-title">poly — zsh</span>
      </div>
      <div class="term-body">
        <p class="term-line cmd" id="term-cmd">poly install page:/</p>
        <div class="term-anim">
          <lottie-player src="lottie/404-lost.json" background="transparent" speed="1" style="width:110px;height:110px" loop autoplay></lottie-player>
        </div>
        <p class="term-line err">✗ 404 Not Found</p>
        <p class="term-line dim" data-i18n="msg">This page doesn't exist, or moved.<span class="cursor"></span></p>
      </div>
    </div>

    <a href="/" class="home-btn" data-i18n="home">← Back to poly.candygate.eu</a>
  </div>

  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
  <script>
    const I18N = {
      en: { msg: "This page doesn't exist, or moved.", home: "← Back to poly.candygate.eu" },
      fr: { msg: "Cette page n'existe pas, ou a été déplacée.", home: "← Retour à poly.candygate.eu" }
    };
    let saved = null;
    try { saved = localStorage.getItem('poly-lang'); } catch (e) {}
    const browserLang = (navigator.language || 'en').toLowerCase().indexOf('fr') === 0 ? 'fr' : 'en';
    const l = I18N[saved] ? saved : browserLang;
    document.documentElement.lang = l;
    document.querySelectorAll('[data-i18n]').forEach((node) => {
      const key = node.getAttribute('data-i18n');
      if (I18N[l][key]) node.firstChild.textContent = I18N[l][key];
    });

    const path = window.location.pathname.replace(/^\//, '') || 'unknown';
    document.getElementById('term-cmd').textContent = 'poly install page:/' + path.slice(0, 40);

    (function () {
      var term = document.querySelector('.term');
      var bar = document.querySelector('.term-bar');
      if (!term || !bar) return;
      var dragging = false, startX = 0, startY = 0, origX = 0, origY = 0;

      function onDown(clientX, clientY) {
        dragging = true;
        var rect = term.getBoundingClientRect();
        term.style.position = 'fixed';
        term.style.left = rect.left + 'px';
        term.style.top = rect.top + 'px';
        term.style.margin = '0';
        origX = rect.left; origY = rect.top;
        startX = clientX; startY = clientY;
        term.classList.add('dragging');
      }
      function onMove(clientX, clientY) {
        if (!dragging) return;
        term.style.left = (origX + (clientX - startX)) + 'px';
        term.style.top = (origY + (clientY - startY)) + 'px';
      }
      function onUp() {
        dragging = false;
        term.classList.remove('dragging');
      }

      bar.addEventListener('mousedown', function (e) { onDown(e.clientX, e.clientY); });
      window.addEventListener('mousemove', function (e) { onMove(e.clientX, e.clientY); });
      window.addEventListener('mouseup', onUp);

      bar.addEventListener('touchstart', function (e) { onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
      window.addEventListener('touchmove', function (e) { onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
      window.addEventListener('touchend', onUp);
    })();
  </script>
</body>
</html>
