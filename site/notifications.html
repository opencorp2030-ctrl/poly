<style>
  :root {
    --ink: #14171d; --ink-raised: #1b1f27; --border: rgba(255, 255, 255, 0.10);
    --text: #e9e4d8; --text-dim: #9c9686; --accent: #f0a93e; --accent-ink: #14171d;
    --danger: #e0664a; --ok: #6fbf8b;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --container: 720px;
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --ink: #eff1f4; --ink-raised: #ffffff; --border: rgba(20, 23, 29, 0.10);
    --text: #1b1e24; --text-dim: #5b6270; --accent: #a8660a; --accent-ink: #ffffff;
    color-scheme: light;
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --ink: #eff1f4; --ink-raised: #ffffff; --border: rgba(20, 23, 29, 0.10);
      --text: #1b1e24; --text-dim: #5b6270; --accent: #a8660a; --accent-ink: #ffffff;
      color-scheme: light;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  body { font-size: 16px; line-height: 1.6; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .wrap { max-width: var(--container); margin: 0 auto; padding-left: clamp(1.25rem, 4vw, 2rem); padding-right: clamp(1.25rem, 4vw, 2rem); }

  header.top { border-bottom: 1px solid var(--border); }
  header.top .wrap { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: nowrap; min-height: 64px; }
  .wordmark { font-family: var(--mono); font-weight: 700; font-size: 1.05rem; letter-spacing: -0.02em; color: var(--text); }
  .wordmark span { color: var(--accent); }
  nav.top-links { display: flex; align-items: center; gap: 1.5rem; font-family: var(--mono); font-size: 0.85rem; }
  nav.top-links a { color: var(--text-dim); }
  nav.top-links a:hover { color: var(--accent); }

  .nav-toggle {
    display: none; flex-direction: column; justify-content: center; align-items: center; gap: 4px;
    width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--ink-raised); cursor: pointer; padding: 0; flex-shrink: 0;
  }
  .nav-toggle span { display: block; width: 16px; height: 2px; background: var(--text); border-radius: 1px; }
  @media (max-width: 960px) {
    .nav-toggle { display: flex; }
    header.top .wrap { position: relative; }
    nav.top-links {
      display: none; position: absolute; top: 100%; left: 0; right: 0;
      flex-direction: column; align-items: stretch; gap: 0;
      background: var(--ink-raised); border-bottom: 1px solid var(--border);
      padding: 0.4rem clamp(1.25rem, 4vw, 2rem) 0.9rem; z-index: 40;
    }
    nav.top-links.open { display: flex; }
    nav.top-links a { padding: 0.65rem 0; border-bottom: 1px solid var(--border); }
    nav.top-links a:last-child { border-bottom: none; }
  }
  .header-actions { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
  .notif-bell { position: relative; display: none; }
  .notif-bell-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--ink-raised); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; position: relative;
  }
  .notif-bell-btn svg { width: 17px; height: 17px; }
  .notif-count {
    position: absolute; top: -2px; right: -2px; min-width: 16px; height: 16px; border-radius: 999px;
    background: var(--danger); color: #fff; font-family: var(--mono); font-size: 0.6rem; font-weight: 700;
    display: none; align-items: center; justify-content: center; padding: 0 3px; line-height: 1;
  }
  .notif-dropdown {
    position: absolute; top: calc(100% + 0.5rem); right: 0; width: 320px; max-width: calc(100vw - 2rem);
    background: var(--ink-raised); border: 1px solid var(--border); border-radius: 8px;
    display: none; flex-direction: column; z-index: 50; box-shadow: 0 8px 24px rgba(0,0,0,0.28);
  }
  .notif-dropdown.open { display: flex; }
  .notif-dropdown-head { display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 0.9rem; border-bottom: 1px solid var(--border); gap: 0.6rem; }
  .notif-dropdown-head .title { font-weight: 700; font-size: 0.85rem; }
  .notif-dropdown-head .head-actions { display: flex; align-items: center; gap: 0.7rem; }
  .notif-mark-all, .notif-see-all { background: none; border: none; color: var(--accent); font-size: 0.72rem; cursor: pointer; padding: 0; font-family: var(--sans); text-decoration: none; }
  .notif-list { max-height: 340px; overflow-y: auto; }
  .notif-item { display: block; padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); cursor: pointer; }
  .notif-item:last-child { border-bottom: none; }
  .notif-item:hover { background: var(--ink); text-decoration: none; }
  .notif-item.unread { background: rgba(240,169,62,0.06); }
  .notif-item .n-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 0.15rem; }
  .notif-item .n-body { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 0.2rem; }
  .notif-item .n-time { font-size: 0.68rem; color: var(--text-dim); font-family: var(--mono); }
  .notif-empty { padding: 1.5rem 0.9rem; text-align: center; font-size: 0.82rem; color: var(--text-dim); }
  .notif-staff-compose { display: none; gap: 0.4rem; padding: 0.6rem 0.9rem; border-top: 1px solid var(--border); }
  .notif-staff-compose input { flex: 1; padding: 0.4rem 0.6rem; background: var(--ink); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.78rem; min-width: 0; }
  .notif-staff-compose button { padding: 0.4rem 0.7rem; background: var(--accent); color: var(--accent-ink); border: none; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; flex-shrink: 0; }

  .user-menu { position: relative; }
  .user-menu-btn {
    width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--ink-raised); cursor: pointer; padding: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .user-menu-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .user-menu-btn .initial { font-family: var(--mono); font-size: 0.85rem; color: var(--text-dim); }
  .user-menu-dropdown {
    position: absolute; top: calc(100% + 0.5rem); right: 0; min-width: 190px;
    background: var(--ink-raised); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.4rem; display: none; flex-direction: column; gap: 0.1rem; z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,0.28);
  }
  .user-menu-dropdown.open { display: flex; }
  .user-menu-name { font-family: var(--mono); font-size: 0.76rem; color: var(--text-dim); padding: 0.4rem 0.6rem 0.55rem; border-bottom: 1px solid var(--border); margin-bottom: 0.3rem; overflow-wrap: anywhere; }
  .user-menu-item {
    display: block; text-align: left; width: 100%; background: none; border: none; cursor: pointer;
    font-family: var(--sans); font-size: 0.85rem; color: var(--text); padding: 0.45rem 0.6rem; border-radius: 6px;
    text-decoration: none; box-sizing: border-box;
  }
  .user-menu-item:hover { background: var(--ink); }
  .user-menu-item.danger { color: var(--danger); }

  footer.site-footer { padding: 2.5rem 0 3.5rem; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.85rem; }
  footer.site-footer .wrap { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  footer.site-footer .footer-brand a { color: var(--text-dim); margin-left: 0.3rem; }
  footer.site-footer .footer-brand a:hover { color: var(--accent); }
  footer.site-footer .footer-links { display: flex; gap: 1.25rem; }
  footer.site-footer .footer-links a { color: var(--text-dim); }
  footer.site-footer .footer-links a:hover { color: var(--accent); }

  main { padding: clamp(2.5rem, 6vw, 4.5rem) 0 5rem; }

  .page-head { display: flex; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 2rem; }
  .page-title { font-family: var(--mono); font-weight: 700; font-size: 1.6rem; }
  .page-mark-all { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; }

  [data-view] { display: none; }
  [data-view].active { display: block; }

  .empty-note { color: var(--text-dim); font-size: 0.9rem; padding: 2rem 0; text-align: center; }

  .n-full-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .n-row { display: block; background: var(--ink-raised); padding: 1rem 1.1rem; text-decoration: none; color: var(--text); cursor: pointer; position: relative; }
  .n-row:hover { background: var(--ink); text-decoration: none; }
  .n-row.unread::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); }
  .n-row .n-row-top { display: flex; align-items: baseline; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.25rem; }
  .n-row .n-row-title { font-weight: 700; font-size: 0.95rem; }
  .n-row .n-row-time { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); flex-shrink: 0; }
  .n-row .n-row-body { font-size: 0.85rem; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .n-row .n-row-type { display: inline-block; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.04em; text-transform: uppercase; color: var(--text-dim); margin-top: 0.35rem; }

  .back-link { font-family: var(--mono); font-size: 0.82rem; color: var(--text-dim); margin-bottom: 1.75rem; display: inline-block; }

  .detail-card { background: var(--ink-raised); border: 1px solid var(--border); border-radius: 12px; padding: clamp(1.5rem, 4vw, 2.25rem); }
  .detail-type { display: inline-block; font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--border); border-radius: 999px; padding: 0.2rem 0.6rem; margin-bottom: 1rem; }
  .detail-title { font-size: 1.4rem; font-weight: 700; margin: 0 0 0.6rem; line-height: 1.35; }
  .detail-meta { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.4rem; color: var(--text-dim); font-size: 0.85rem; }
  .detail-from-avatar {
    width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
    background: var(--ink); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim);
  }
  .detail-from-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
  .detail-from-name { color: var(--text); font-weight: 600; }
  .detail-time { font-family: var(--mono); }
  .detail-body { font-size: 1rem; line-height: 1.7; margin-bottom: 1.5rem; word-wrap: break-word; }
  .detail-body p:first-child { margin-top: 0; }
  .detail-body p:last-child { margin-bottom: 0; }
  .detail-view-link { display: inline-block; padding: 0.6rem 1.1rem; background: var(--accent); color: var(--accent-ink); border-radius: 8px; font-weight: 700; font-size: 0.85rem; }
  .detail-view-link:hover { text-decoration: none; opacity: 0.9; }
</style>

<script>
(function () {
  var toggle = document.getElementById('nav-toggle');
  var links = document.getElementById('top-links');
  if (!toggle || !links) return;
  toggle.addEventListener('click', function () {
    var open = links.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  links.querySelectorAll('a').forEach(function (a) {
    a.addEventListener('click', function () {
      links.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    });
  });
})();
</script>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const SUPABASE_URL = 'https://iuymslcbbrbahxbfuzrr.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_ocTnDk4vyMMGcyGBeB3bOg_0CMGkdaD';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const I18N = {
    en: {
      nav_dependencies: "dependencies", nav_docs: "docs", nav_community: "community", nav_account: "account",
      footer_text: "Poly is open source, MIT licensed.", footer_terms: "Terms", footer_privacy: "Privacy", footer_security: "Security",
      see_all: "See all",
      page_title: "Notifications",
      mark_all: "Mark all read",
      back: "← Back to notifications",
      view_link: "View →",
      signin_required: "Sign in to see your notifications.",
      empty: "No notifications yet.",
      not_found: "Notification not found.",
      type_follow: "Follow", type_download: "Download", type_friend_request: "Friend request",
      type_friend_accept: "Friend accepted", type_staff_broadcast: "Staff announcement",
      type_admin_message: "Message from admin", type_system: "System",
    },
    fr: {
      nav_dependencies: "dépendances", nav_docs: "doc", nav_community: "communauté", nav_account: "compte",
      footer_text: "Poly est open source, sous licence MIT.", footer_terms: "Conditions", footer_privacy: "Confidentialité", footer_security: "Sécurité",
      see_all: "Tout voir",
      page_title: "Notifications",
      mark_all: "Tout marquer comme lu",
      back: "← Retour aux notifications",
      view_link: "Voir →",
      signin_required: "Connecte-toi pour voir tes notifications.",
      empty: "Aucune notification pour l'instant.",
      not_found: "Notification introuvable.",
      type_follow: "Abonnement", type_download: "Téléchargement", type_friend_request: "Demande d'ami",
      type_friend_accept: "Ami accepté", type_staff_broadcast: "Annonce du staff",
      type_admin_message: "Message de l'admin", type_system: "Système",
    }
  };

  function lang() { return document.documentElement.lang || 'en'; }
  function t(key) { return (I18N[lang()] || I18N.en)[key] || key; }

  function applyLanguage(l) {
    if (!I18N[l]) l = 'en';
    document.documentElement.lang = l;
    document.querySelectorAll('[data-i18n]').forEach((node) => {
      const key = node.getAttribute('data-i18n');
      if (I18N[l][key] !== undefined) node.textContent = I18N[l][key];
    });
    try { localStorage.setItem('poly-lang', l); } catch (e) {}
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s == null ? '' : String(s);
    return div.innerHTML;
  }
  function timeAgo(iso) {
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 60) return 'now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h';
    return Math.floor(diff / 86400) + 'd';
  }
  function typeLabel(type) {
    return t('type_' + type) !== 'type_' + type ? t('type_' + type) : type;
  }
  function showView(name) {
    document.querySelectorAll('[data-view]').forEach((el) => el.classList.toggle('active', el.getAttribute('data-view') === name));
  }

  const notifId = new URLSearchParams(window.location.search).get('id');

  async function loadFullList() {
    const { data } = await supabase.from('notifications')
      .select('id, type, title, body_html, link_url, is_service, created_at, read_at')
      .order('created_at', { ascending: false })
      .limit(100);
    const rows = data || [];
    const container = document.getElementById('full-list');
    if (!rows.length) {
      container.innerHTML = `<p class="empty-note">${t('empty')}</p>`;
      return;
    }
    container.innerHTML = `<div class="n-full-list">${rows.map((n) => `
      <a class="n-row ${n.read_at ? '' : 'unread'}" href="notifications.html?id=${encodeURIComponent(n.id)}">
        <div class="n-row-top">
          <span class="n-row-title">${escapeHtml(n.title)}</span>
          <span class="n-row-time">${timeAgo(n.created_at)}</span>
        </div>
        ${n.body_html ? `<div class="n-row-body">${n.body_html}</div>` : ''}
        <div class="n-row-type">${escapeHtml(typeLabel(n.type))}</div>
      </a>
    `).join('')}</div>`;
  }

  document.getElementById('page-mark-all').addEventListener('click', async () => {
    await supabase.rpc('mark_all_notifications_read');
    loadFullList();
  });

  async function loadDetail(id) {
    const { data: rows } = await supabase.from('notifications')
      .select('id, type, title, body_html, link_url, from_user_id, created_at, read_at')
      .eq('id', id)
      .limit(1);
    const n = rows && rows[0];
    if (!n) {
      document.getElementById('detail-title').textContent = t('not_found');
      document.getElementById('detail-type').style.display = 'none';
      document.getElementById('detail-meta').innerHTML = '';
      document.getElementById('detail-body').innerHTML = '';
      showView('detail');
      return;
    }

    if (!n.read_at) await supabase.rpc('mark_notification_read', { p_id: n.id });

    document.getElementById('detail-type').textContent = typeLabel(n.type);
    document.getElementById('detail-type').style.display = 'inline-block';
    document.getElementById('detail-title').textContent = n.title;
    document.getElementById('detail-body').innerHTML = n.body_html || '';

    const metaEl = document.getElementById('detail-meta');
    const dateStr = new Date(n.created_at).toLocaleString(lang() === 'fr' ? 'fr-FR' : 'en-US', { dateStyle: 'medium', timeStyle: 'short' });
    metaEl.innerHTML = `<span class="detail-time">${escapeHtml(dateStr)}</span>`;

    if (n.from_user_id) {
      const { data: fromProf } = await supabase.from('profiles_public').select('username, avatar_url').eq('id', n.from_user_id).maybeSingle();
      if (fromProf) {
        const avatarHtml = fromProf.avatar_url
          ? `<img src="${escapeHtml(fromProf.avatar_url)}" alt="">`
          : escapeHtml((fromProf.username || '?').charAt(0).toUpperCase());
        metaEl.innerHTML = `
          <a href="profile.html?u=${encodeURIComponent(fromProf.username)}" class="detail-from-avatar">${avatarHtml}</a>
          <a href="profile.html?u=${encodeURIComponent(fromProf.username)}" class="detail-from-name">@${escapeHtml(fromProf.username)}</a>
          <span>·</span>
          <span class="detail-time">${escapeHtml(dateStr)}</span>
        `;
      }
    }

    const viewLink = document.getElementById('detail-view-link');
    if (n.link_url) { viewLink.href = n.link_url; viewLink.style.display = 'inline-block'; }
    else { viewLink.style.display = 'none'; }

    showView('detail');
  }

  async function renderUserMenu(session) {
    const menu = document.getElementById('user-menu');
    if (!session) { menu.style.display = 'none'; return; }

    const { data } = await supabase.from('profiles_public').select('username, avatar_url').eq('id', session.user.id).single();
    const avatarSlot = document.getElementById('user-menu-avatar');
    if (data && data.avatar_url) {
      const img = document.createElement('img');
      img.id = 'user-menu-avatar';
      img.src = data.avatar_url;
      img.alt = '';
      avatarSlot.replaceWith(img);
    } else {
      avatarSlot.textContent = ((data && data.username) || session.user.email || '?').charAt(0).toUpperCase();
    }
    document.getElementById('user-menu-name').textContent = data && data.username ? '@' + data.username : session.user.email;
    menu.style.display = 'block';
  }

  document.getElementById('user-menu-btn').addEventListener('click', () => {
    document.getElementById('user-menu-dropdown').classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('user-menu');
    if (!menu.contains(e.target)) document.getElementById('user-menu-dropdown').classList.remove('open');
  });
  document.getElementById('user-menu-signout').addEventListener('click', async () => {
    await supabase.auth.signOut();
    window.location.reload();
  });

  async function checkBan(session) {
    if (!session) return;
    const { data } = await supabase.rpc('check_banned');
    if (data && data[0] && data[0].banned) window.location.href = 'banned.html';
  }

  const ADMIN_ID = '7aeb0cc5-7188-46f3-8e12-4caa84573087';
  let notifCache = [];
  let notifPollInterval = null;
  async function loadNotifications() {
    const { data } = await supabase.from('notifications').select('id, type, title, body_html, link_url, is_service, created_at, read_at').order('created_at', { ascending: false }).limit(30);
    notifCache = data || [];
    const list = document.getElementById('notif-list');
    const countEl = document.getElementById('notif-count');
    if (!notifCache.length) {
      list.innerHTML = '<div class="notif-empty">No notifications yet.</div>';
      countEl.style.display = 'none';
      return;
    }
    const unread = notifCache.filter((n) => !n.read_at).length;
    if (unread > 0) { countEl.textContent = unread > 9 ? '9+' : String(unread); countEl.style.display = 'flex'; } else { countEl.style.display = 'none'; }
    list.innerHTML = notifCache.map((n) => `
      <a class="notif-item ${n.read_at ? '' : 'unread'}" href="notifications.html?id=${encodeURIComponent(n.id)}">
        <div class="n-title">${escapeHtml(n.title)}</div>
        ${n.body_html ? `<div class="n-body">${n.body_html}</div>` : ''}
        <div class="n-time">${timeAgo(n.created_at)}</div>
      </a>
    `).join('');
  }
  document.getElementById('notif-bell-btn').addEventListener('click', () => {
    const dd = document.getElementById('notif-dropdown');
    const open = dd.classList.toggle('open');
    document.getElementById('notif-bell-btn').setAttribute('aria-expanded', open ? 'true' : 'false');
    if (open) loadNotifications();
  });
  document.addEventListener('click', (e) => {
    const bell = document.getElementById('notif-bell');
    if (bell && !bell.contains(e.target)) document.getElementById('notif-dropdown').classList.remove('open');
  });
  document.getElementById('notif-mark-all').addEventListener('click', async () => {
    await supabase.rpc('mark_all_notifications_read');
    loadNotifications();
    if (!notifId) loadFullList();
  });
  document.getElementById('notif-staff-send').addEventListener('click', async () => {
    const input = document.getElementById('notif-staff-input');
    const title = input.value.trim();
    if (!title) return;
    const { error } = await supabase.rpc('send_broadcast_notification', { p_title: title, p_body_html: null, p_target_usernames: null });
    if (!error) { input.value = ''; loadNotifications(); }
  });
  async function initNotifBell(session) {
    const bell = document.getElementById('notif-bell');
    clearInterval(notifPollInterval);
    if (!session) { bell.style.display = 'none'; return; }
    bell.style.display = 'block';
    const { data: prof } = await supabase.from('profiles_public').select('badges').eq('id', session.user.id).maybeSingle();
    const isStaff = !!(prof && prof.badges && prof.badges.includes('staff'));
    document.getElementById('notif-staff-compose').style.display = (isStaff || session.user.id === ADMIN_ID) ? 'flex' : 'none';
    loadNotifications();
    notifPollInterval = setInterval(loadNotifications, 60000);
  }

  async function initPage(session) {
    if (!session) { showView('signedout'); return; }
    if (notifId) await loadDetail(notifId);
    else { showView('list'); await loadFullList(); }
  }

  let saved = null;
  try { saved = localStorage.getItem('poly-lang'); } catch (e) {}
  const browserLang = (navigator.language || 'en').toLowerCase().indexOf('fr') === 0 ? 'fr' : 'en';
  applyLanguage(saved || browserLang);

  supabase.auth.onAuthStateChange((_event, session) => { renderUserMenu(session); checkBan(session); initNotifBell(session); });
  supabase.auth.getSession().then(({ data }) => {
    renderUserMenu(data.session);
    checkBan(data.session);
    initNotifBell(data.session);
    initPage(data.session);
  });
</script>

</body>
</html>
